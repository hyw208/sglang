name: sglang-llm

services:
  sglang-qwen:
    container_name: sglang-qwen
    image: lmsysorg/sglang:latest
    restart: unless-stopped
    network_mode: host
    ipc: host
    shm_size: "32g"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command:
      - sglang
      - serve
      - --model-path
      - Qwen/Qwen3.6-27B-FP8
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --mem-fraction-static
      - "0.9"
      - --cuda-graph-max-bs
      - "8"
      - --max-total-tokens
      - "262144"
      - --context-length
      - "262144"
      - --chunked-prefill-size
      - "16384"
      - --max-prefill-tokens
      - "65536"
      - --reasoning-parser
      - qwen3
      - --tool-call-parser
      - qwen3_coder
      - --allow-auto-truncate
      - --trust-remote-code
      - --max-running-requests
      - "2"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
